<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BOM Matcher{% endblock %}</title>

    <!-- CSRF Token for JavaScript -->
    <meta name="csrf-token" content="{{ csrf_token() if csrf_token is defined else '' }}">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Design System CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/matcher.css') }}">

    {% block extra_styles %}{% endblock %}
</head>

<body>
    <!-- Top Bar -->
    <header class="topbar">
        <div class="topbar-title">
            <span>🔍</span>
            <span>BOM Matcher</span>
        </div>
        <div class="topbar-actions">
            {% block topbar_actions %}{% endblock %}
        </div>
    </header>

    <!-- Main Content -->
    <main class="page-container">
        {% block content %}{% endblock %}
    </main>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/sanitize.js') }}"></script>
    <script src="{{ url_for('static', filename='js/toast.js') }}"></script>
    <script src="{{ url_for('static', filename='js/modal.js') }}"></script>

    <script>
        // Show/hide loading overlay
        function showLoading() {
            document.getElementById('loadingOverlay').classList.add('show');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('show');
        }

        // API helper with CSRF token support
        async function apiCall(url, options = {}) {
            try {
                const csrfToken = document.querySelector('meta[name="csrf-token"]')?.getAttribute('content');

                const headers = {
                    'Content-Type': 'application/json',
                    ...options.headers
                };

                if (csrfToken) {
                    headers['X-CSRFToken'] = csrfToken;
                }

                const response = await fetch(url, {
                    headers,
                    ...options
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Request failed');
                }

                return data;
            } catch (error) {
                toast.error(error.message);
                throw error;
            }
        }

        // Get CSRF token for form submissions
        function getCsrfToken() {
            return document.querySelector('meta[name="csrf-token"]')?.getAttribute('content') || '';
        }
    </script>

    {% block extra_scripts %}{% endblock %}
</body>

</html>
